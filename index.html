function fetchResult(){

const regNo=document.getElementById("regNo").value;
const selectedClass=document.getElementById("classSelect").value;
const resultDiv=document.getElementById("result");

if(studentResults[regNo] && studentResults[regNo].class===selectedClass){

let student=studentResults[regNo];
let subjects=student.subjects;

let total=0;
let fail=false;
let rows="";

for(let sub in subjects){

let mark=subjects[sub];
total+=mark;

let colorClass="pass-subject";

if(mark<18){
colorClass="fail-subject";
fail=true;
}

rows+=`<tr class="${colorClass}">
<td>${sub}</td>
<td>${mark}</td>
</tr>`;
}

let finalResult=fail?"FAIL":"PASS";

resultDiv.innerHTML=`

<b>NAME:</b> ${student.name}<br>
<b>CLASS:</b> ${student.class}

<table>
${rows}
<tr>
<td><b>TOTAL</b></td>
<td><b>${total}</b></td>
</tr>
</table>

<br>
<b>FINAL RESULT:</b>
<span class="${finalResult==='PASS'?'pass':'fail'}">${finalResult}</span>

`;

}else{

resultDiv.innerHTML="<span class='fail'>NO RESULT FOUND</span>";

}

resultDiv.style.display="block";

}
